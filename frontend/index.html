<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뿌옷장</title>
  <meta name="description" content="뿌옷장 - 패션 상품 검색" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 py-4">
      <div class="flex flex-wrap items-end gap-3">
        <div class="mr-2 text-2xl font-black tracking-tight">뿌옷장</div>

        <div class="min-w-[260px] flex-1">
          <label class="mb-1 block text-xs font-semibold text-slate-500">검색어</label>
          <input id="q" value="여성 봄 니트" placeholder="예: 여자/빨간색/니트"
            class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none ring-indigo-100 transition focus:border-indigo-400 focus:ring" />
        </div>

        <div class="w-28">
          <label class="mb-1 block text-xs font-semibold text-slate-500">최소가격</label>
          <input id="minPrice" type="number" min="0" step="1000" value="30000"
            class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none focus:border-indigo-400" />
        </div>

        <div class="w-28">
          <label class="mb-1 block text-xs font-semibold text-slate-500">최대가격</label>
          <input id="maxPrice" type="number" min="0" step="1000" value="100000"
            class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none focus:border-indigo-400" />
        </div>

        <div class="w-40">
          <label class="mb-1 block text-xs font-semibold text-slate-500">정렬</label>
          <select id="sortBy" class="w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm outline-none focus:border-indigo-400">
            <option value="popular" selected>기본(인기)</option>
            <option value="rating_desc">평점순</option>
            <option value="review_count_desc">리뷰 많은순</option>
          </select>
        </div>

        <button id="searchBtn" onclick="runSearch()" class="rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700">검색</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-4">
    <section class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
      <div id="metaMain" class="text-sm font-semibold">대기 중</div>
      <div id="metaSub" class="mt-1 text-xs text-slate-500">업데이트 주기: 자동 1시간 + 수동</div>
      <div id="searchHint" class="mt-3 rounded-xl border border-indigo-200 bg-indigo-50 px-3 py-2 text-xs text-indigo-700">
        팁: 사진 검색 후 검색어를 1~2단어 바꾸면 결과가 더 정확해져요.
      </div>
      <div class="mt-3 flex flex-wrap gap-2">
        <button onclick="runSearch()" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-semibold hover:bg-slate-50">업데이트</button>
        <button onclick="showLikedItems()" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-semibold hover:bg-slate-50">좋아요 모아보기</button>
      </div>
    </section>

    <section class="mb-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
      <div id="imageMeta" class="text-xs text-slate-600">사진으로 유사 스타일 찾기 (GPT 정확 모드)</div>
      <div class="mt-3 flex flex-wrap items-center gap-2">
        <select id="imageGender" class="rounded-xl border border-slate-200 px-3 py-2 text-sm">
          <option value="auto" selected>성별 자동</option>
          <option value="여자">여자</option>
          <option value="남자">남자</option>
          <option value="공용">공용</option>
        </select>

        <select id="imageCategory" class="rounded-xl border border-slate-200 px-3 py-2 text-sm">
          <option value="auto" selected>카테고리 자동</option>
          <option value="상의">상의</option>
          <option value="하의">하의</option>
          <option value="니트">니트</option>
          <option value="가디건">가디건</option>
          <option value="청바지">청바지</option>
          <option value="자켓">자켓</option>
          <option value="코트">코트</option>
          <option value="원피스">원피스</option>
          <option value="스커트">스커트</option>
          <option value="후드">후드</option>
        </select>

        <input id="styleImage" type="file" accept="image/*" class="min-w-[220px] flex-1 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" />
        <button onclick="runImageSearch()" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">사진 검색</button>
      </div>
    </section>

    <section id="grid" class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5"></section>

    <div class="mt-5 text-center">
      <button id="moreBtn" onclick="loadMore()" class="rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white disabled:cursor-not-allowed disabled:opacity-40">더보기</button>
    </div>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const metaMain = document.getElementById('metaMain');
    const metaSub = document.getElementById('metaSub');
    const imageMeta = document.getElementById('imageMeta');
    const searchHint = document.getElementById('searchHint');
    const styleImageInput = document.getElementById('styleImage');
    const imageGender = document.getElementById('imageGender');
    const imageCategory = document.getElementById('imageCategory');
    const moreBtn = document.getElementById('moreBtn');
    const ACTIVE_SITES = ['musinsa', '29cm', 'zigzag', 'lotteon', '11st'];
    const AUTO_REFRESH_MS = 60 * 60 * 1000;

    const state = {
      query: '여성 봄 니트',
      filters: {},
      items: [],
      nextMap: {},
      generatedAt: null,
      autoRefreshStarted: false,
      sortBy: 'popular'
    };

    function money(v){ return typeof v === 'number' ? v.toLocaleString('ko-KR') + '원' : '-'; }

    function formatKST(isoString){
      if (!isoString) return '-';
      const dt = new Date(isoString);
      if (Number.isNaN(dt.getTime())) return '-';
      return new Intl.DateTimeFormat('ko-KR', {
        timeZone: 'Asia/Seoul',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
      }).format(dt);
    }

    function esc(s){ return String(s || '').replace(/'/g, "&#39;"); }

    function render(items){
      grid.innerHTML = '';
      for (const it of items) {
        const card = document.createElement('article');
        card.className = 'overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm';
        card.innerHTML = `
          <img loading="lazy" src="${it.thumbnail || ''}" alt="${it.title || ''}" class="aspect-square w-full bg-slate-100 object-cover"/>
          <div class="p-3">
            <div class="text-[11px] text-slate-500">${it.site || ''} · ${it.brand || '-'}</div>
            <div class="mt-1 line-clamp-2 min-h-[2.6rem] text-sm font-semibold leading-5">${it.title || '-'}</div>
            <div class="mt-2 text-sm font-bold">${money(it.price)}</div>
            <div class="mt-1 text-xs text-slate-500">평점 ${it.rating ?? '-'} · 리뷰 ${it.review_count ?? '-'}</div>
            <div class="mt-1 text-xs text-slate-600">${(it.review_summary || []).slice(0,2).join(' / ')}</div>
            ${typeof it.similarity === 'number' ? `<div class="mt-1 text-xs text-indigo-600">유사도 ${(it.similarity * 100).toFixed(1)}%</div>` : ''}
            <a href="${it.product_url}" target="_blank" rel="noreferrer" class="mt-2 inline-block text-xs font-semibold text-indigo-600 hover:text-indigo-500">원문 상품 보기</a>
            <div class="mt-2 flex gap-1.5">
              <button class="rounded-lg border border-slate-200 px-2 py-1 text-[11px]" onclick="sendImageFeedback('like','${esc(it.product_url)}','${esc(it.title)}','${esc(it.brand)}','${esc(String(it.price ?? ''))}','${esc(it.thumbnail)}')">👍 좋아요</button>
              <button class="rounded-lg border border-slate-200 px-2 py-1 text-[11px]" onclick="sendImageFeedback('unlike','${esc(it.product_url)}','${esc(it.title)}','${esc(it.brand)}','${esc(String(it.price ?? ''))}','${esc(it.thumbnail)}')">↩ 취소</button>
              <button class="rounded-lg border border-slate-200 px-2 py-1 text-[11px]" onclick="sendImageFeedback('dislike','${esc(it.product_url)}','${esc(it.title)}','${esc(it.brand)}','${esc(String(it.price ?? ''))}','${esc(it.thumbnail)}')">🚫 아님</button>
            </div>
          </div>`;
        grid.appendChild(card);
      }
    }

    function updateMoreButton(){
      const hasNext = Object.values(state.nextMap).some(v => !!v);
      moreBtn.disabled = !hasNext;
      const parts = ACTIVE_SITES.map(s => `${s}:${state.nextMap[s] ? 'next' : '끝'}`);
      moreBtn.textContent = hasNext ? `더보기 (${parts.join(' | ')})` : '더보기 (모든 사이트 끝)';
    }

    function sortLabel(v){
      if (v === 'rating_desc') return '평점순';
      if (v === 'review_count_desc') return '리뷰 많은순';
      return '기본(인기)';
    }

    async function sendImageFeedback(action, productUrl, title, brand, price, thumbnail){
      const fd = new FormData();
      fd.append('action', action);
      fd.append('product_url', productUrl || '');
      fd.append('title', title || '');
      fd.append('brand', brand || '');
      fd.append('price', price || '');
      fd.append('thumbnail', thumbnail || '');
      await fetch('/image-feedback', { method:'POST', body: fd });
      if (action === 'dislike') imageMeta.textContent = '해당 상품은 이후 검색에서 숨김 처리됩니다.';
      else if (action === 'like') imageMeta.textContent = '좋아요 리스트에 저장했어요.';
      else if (action === 'unlike') imageMeta.textContent = '좋아요를 취소했어요.';
    }

    async function showLikedItems(){
      const res = await fetch('/liked');
      const data = await res.json();
      if (!data.ok) return;
      state.items = (data.items || []).map(it => ({
        site: '좋아요', brand: it.brand || '-', title: it.title || '-',
        price: Number(it.price || 0) || null, product_url: it.product_url,
        thumbnail: it.thumbnail || '', rating: null, review_count: null, review_summary: [],
      }));
      state.nextMap = {};
      render(state.items);
      metaMain.textContent = `좋아요 저장 상품 ${state.items.length}개`;
      metaSub.textContent = '좋아요 모아보기 화면';
      moreBtn.disabled = true;
    }

    async function runImageSearch(){
      const file = styleImageInput?.files?.[0];
      if (!file) { imageMeta.textContent = '이미지 파일을 먼저 선택해줘.'; return; }

      imageMeta.textContent = '사진 분석 중...';
      const fd = new FormData();
      fd.append('image', file);
      fd.append('gender', imageGender?.value || 'auto');
      fd.append('category', imageCategory?.value || 'auto');

      const res = await fetch('/image-search', { method: 'POST', body: fd });
      const data = await res.json();
      if (!data.ok) { imageMeta.textContent = `사진 분석 실패: ${data.error || 'unknown'}`; return; }

      document.getElementById('q').value = data.query || '여자 니트';
      const t = data.tags || {};
      const tagText = Array.isArray(t.style_tags) && t.style_tags.length ? ` / 태그:${t.style_tags.join(', ')}` : '';
      const confText = (typeof t.confidence === 'number') ? ` / 신뢰도:${(t.confidence * 100).toFixed(0)}%` : '';
      imageMeta.textContent = `추론: ${data.query} · 성별:${t.gender || '-'} / 색:${t.color || '-'} / 무늬:${t.pattern || '-'} / 종류:${t.item || '-'}${tagText}${confText}`;
      searchHint.textContent = `팁: 현재 검색어 "${data.query}"에서 색/종류/무늬를 한 단어씩 바꿔보면 더 좋아요.`;

      state.query = data.query || state.query;
      state.items = data.items || [];
      state.nextMap = {};
      state.generatedAt = new Date().toISOString();
      render(state.items);
      updateMoreButton();
      metaMain.textContent = `이미지 유사 검색 결과 ${state.items.length}개 · ${formatKST(state.generatedAt)}`;
      metaSub.textContent = '정렬: 이미지 유사도';
    }

    function startAutoRefresh(){
      if (state.autoRefreshStarted) return;
      state.autoRefreshStarted = true;
      setInterval(() => runSearch(), AUTO_REFRESH_MS);
    }

    function buildFilters(){
      const minPriceVal = Number(document.getElementById('minPrice').value || 0);
      const maxPriceVal = Number(document.getElementById('maxPrice').value || 0);
      return {
        category: 'knitwear',
        season: 'spring',
        color: ['beige','ivory','gray','navy','red','yellow','pink','black'],
        price_range: [minPriceVal || 0, maxPriceVal || 9999999],
      };
    }

    async function runSearch(){
      state.query = document.getElementById('q').value.trim() || '여성 봄 니트';
      state.filters = buildFilters();
      state.sortBy = document.getElementById('sortBy').value || 'popular';
      metaMain.textContent = '검색 중...';

      const body = {
        query: state.query,
        sites: ACTIVE_SITES,
        sort: state.sortBy,
        limit_per_site: 50,
        include_reviews: true,
        filters: state.filters
      };

      const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      state.items = (data.results || []).flatMap(r => (r.items || []).map(it => ({...it, site: r.site})));
      state.nextMap = {};
      for (const s of ACTIVE_SITES) state.nextMap[s] = data.pagination?.[s]?.next || null;

      state.generatedAt = data.generated_at || null;
      const siteCounts = (data.results || []).map(r => `${r.site} ${r.items.length}개`).join(', ');
      metaMain.textContent = `결과 ${state.items.length}개 · ${formatKST(state.generatedAt)}`;
      metaSub.textContent = `정렬: ${sortLabel(state.sortBy)} · 사이트별: ${siteCounts}`;
      render(state.items);
      updateMoreButton();
    }

    async function loadMore(){
      const targetSites = ACTIVE_SITES.filter(site => state.nextMap[site]);
      if (!targetSites.length) return;
      moreBtn.disabled = true;

      const pages = await Promise.all(targetSites.map(async site => {
        const res = await fetch('/more', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            site,
            query: state.query,
            cursor: String(state.nextMap[site]),
            limit_per_site: 50,
            sort: state.sortBy,
            filters: state.filters
          })
        });
        return { site, page: await res.json() };
      }));

      const urlSet = new Set(state.items.map(i => i.product_url));
      for (const { site, page } of pages) {
        for (const it of (page.items || []).map(it => ({...it, site: page.site}))) {
          if (!urlSet.has(it.product_url)) {
            state.items.push(it);
            urlSet.add(it.product_url);
          }
        }
        state.nextMap[site] = page.next_cursor || null;
      }

      render(state.items);
      updateMoreButton();
      metaMain.textContent = `결과 ${state.items.length}개 · ${formatKST(state.generatedAt)}`;
      metaSub.textContent = `정렬: ${sortLabel(state.sortBy)} · 더보기 반영 완료`;
    }

    runSearch();
    startAutoRefresh();
  </script>
</body>
</html>
