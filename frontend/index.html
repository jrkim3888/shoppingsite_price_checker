<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뿌옷장</title>
  <meta name="description" content="뿌옷장 - 패션 상품 검색" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="뿌옷장" />
  <meta property="og:description" content="뿌옷장 - 패션 상품 검색" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="뿌옷장" />
  <meta name="twitter:description" content="뿌옷장 - 패션 상품 검색" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #f7f7f9; color: #111; }
    header { position: sticky; top: 0; background: white; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display: flex; flex-wrap: wrap; gap: 8px; z-index: 10; align-items: flex-end; }
    .brand { font-size: 18px; font-weight: 800; margin-right: 8px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .query-field { flex: 1 1 360px; min-width: 280px; max-width: 520px; }
    .price-field { width: 120px; }
    .label { font-size: 12px; color: #6b7280; font-weight: 600; }
    input, select { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; width: 100%; box-sizing: border-box; background: white; }
    #q { width: 100%; }
    .price-input { width: 100%; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; background: #111827; color: white; cursor: pointer; }
    @media (max-width: 900px) {
      header {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: stretch;
      }
      .brand,
      .query-field,
      #sortField,
      #searchBtn {
        grid-column: 1 / -1;
      }
      .brand { margin-bottom: 4px; }
      .query-field { min-width: 0; max-width: 100%; }
      .field { min-width: 0; }
      #minPriceField { grid-column: 1 / 2; width: 100%; }
      #maxPriceField { grid-column: 2 / 3; width: 100%; }
      .price-input,
      #searchBtn { width: 100%; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .card img { aspect-ratio: 1 / 1; height: auto; }
      .title { font-size: 13px; min-height: 34px; }
    }
    .wrap { padding: 16px; }
    .meta { margin-bottom: 12px; color: #4b5563; font-size: 14px; display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: center; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; }
    .meta-main { flex: 1 1 360px; }
    .meta-sub { font-size: 12px; color: #6b7280; }
    .hint-box { width: 100%; margin-top: 6px; padding: 8px 10px; border-radius: 8px; background: #eef2ff; color: #3730a3; font-size: 12px; border: 1px solid #c7d2fe; }
    .refresh-btn { background: #1f2937; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    .card img { width: 100%; height: 280px; object-fit: cover; background: #f3f4f6; }
    .card .p { padding: 10px; }
    .title { font-size: 14px; font-weight: 600; line-height: 1.4; min-height: 38px; }
    .sub { font-size: 12px; color: #6b7280; }
    .price { margin-top: 6px; font-weight: 700; }
    .review { margin-top: 8px; font-size: 12px; color: #374151; }
    a { color: #2563eb; text-decoration: none; font-size: 12px; }
    .feedback-row { margin-top: 8px; display: flex; gap: 6px; }
    .mini-btn { font-size: 11px; padding: 6px 8px; background: #374151; border-radius: 6px; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .card img { aspect-ratio: 1 / 1; height: auto; }
      .title { font-size: 13px; min-height: 34px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">뿌옷장</div>
    <div class="field query-field">
      <div class="label">검색어 (성별/색/종류 형태로 입력 · 예: 여자/빨간색/니트)</div>
      <input id="q" value="여성 봄 니트" placeholder="예: 여자/빨간색/니트" />
    </div>
    <div class="field price-field" id="minPriceField">
      <div class="label">최소 가격(원)</div>
      <input id="minPrice" class="price-input" type="number" min="0" step="1000" placeholder="최소금액" value="30000" />
    </div>
    <div class="field price-field" id="maxPriceField">
      <div class="label">최대 가격(원)</div>
      <input id="maxPrice" class="price-input" type="number" min="0" step="1000" placeholder="최대금액" value="100000" />
    </div>
    <div class="field" id="sortField">
      <div class="label">정렬 기준</div>
      <select id="sortBy">
        <option value="popular" selected>기본(인기)</option>
        <option value="rating_desc">평점순</option>
        <option value="review_count_desc">리뷰 많은순</option>
      </select>
    </div>
    <button id="searchBtn" onclick="runSearch()">검색</button>
  </header>
  <div class="wrap">
    <div class="meta" id="meta">
      <div class="meta-main" id="metaMain">대기 중</div>
      <div class="meta-sub" id="metaSub">업데이트 주기: 자동 1시간 + 수동 (업데이트 버튼)</div>
      <div class="hint-box" id="searchHint">팁: 사진 검색 후 위 검색어를 상황에 맞게 한두 단어 수정하면 결과가 더 정확해져요.</div>
      <div class="meta-sub" style="width:100%;">안내: <b>좋아요</b>는 저장되어 "좋아요 모아보기"에서 다시 볼 수 있고, <b>아님</b>은 이후 모든 검색 결과에서 숨겨져요.</div>
      <button class="refresh-btn" onclick="runSearch()">업데이트</button>
      <button class="refresh-btn" onclick="showLikedItems()">좋아요 모아보기</button>
    </div>
    <div class="meta" style="margin-top:-4px;">
      <div class="meta-main">
        <div class="meta-sub" id="imageMeta">사진으로 유사 스타일 찾기 (GPT 정확 모드)</div>
        <div class="meta-sub" style="margin-top:4px;">사용법: ①성별/카테고리 선택(선택) ②사진 업로드 ③사진 검색 클릭</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;">
          <select id="imageGender" style="max-width:170px;">
            <option value="auto" selected>성별 자동</option>
            <option value="여자">여자</option>
            <option value="남자">남자</option>
            <option value="공용">공용</option>
          </select>
          <select id="imageCategory" style="max-width:170px;">
            <option value="auto" selected>카테고리 자동</option>
            <option value="상의">상의</option>
            <option value="하의">하의</option>
            <option value="니트">니트</option>
            <option value="가디건">가디건</option>
            <option value="청바지">청바지</option>
            <option value="자켓">자켓</option>
            <option value="코트">코트</option>
            <option value="원피스">원피스</option>
            <option value="스커트">스커트</option>
            <option value="후드">후드</option>
          </select>
          <input id="styleImage" type="file" accept="image/*" style="min-width:220px; flex:1;" />
        </div>
      </div>
      <button class="refresh-btn" onclick="runImageSearch()">사진 검색</button>
    </div>
    <div class="grid" id="grid"></div>
    <div style="margin-top:16px; text-align:center;">
      <button id="moreBtn" onclick="loadMore()">더보기</button>
    </div>
  </div>
  <script>
    const grid = document.getElementById('grid');
    const metaMain = document.getElementById('metaMain');
    const metaSub = document.getElementById('metaSub');
    const imageMeta = document.getElementById('imageMeta');
    const searchHint = document.getElementById('searchHint');
    const styleImageInput = document.getElementById('styleImage');
    const imageGender = document.getElementById('imageGender');
    const imageCategory = document.getElementById('imageCategory');
    const moreBtn = document.getElementById('moreBtn');
    const ACTIVE_SITES = ['musinsa', '29cm', 'zigzag', 'lotteon', '11st'];
    const AUTO_REFRESH_MS = 60 * 60 * 1000;

    const state = {
      query: '여성 봄 니트',
      filters: {},
      items: [],
      nextMap: {},
      generatedAt: null,
      autoRefreshStarted: false,
      sortBy: 'popular'
    };

    function money(v){ return typeof v === 'number' ? v.toLocaleString('ko-KR') + '원' : '-'; }

    function formatKST(isoString){
      if (!isoString) return '-';
      const dt = new Date(isoString);
      if (Number.isNaN(dt.getTime())) return '-';
      return new Intl.DateTimeFormat('ko-KR', {
        timeZone: 'Asia/Seoul',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      }).format(dt);
    }

    function render(items){
      grid.innerHTML = '';
      for (const it of items) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img loading="lazy" src="${it.thumbnail || ''}" alt="${it.title || ''}" />
          <div class="p">
            <div class="sub">${it.site || ''} · ${it.brand || '-'}</div>
            <div class="title">${it.title || '-'}</div>
            <div class="price">${money(it.price)}</div>
            <div class="sub">평점 ${it.rating ?? '-'} · 리뷰 ${it.review_count ?? '-'}</div>
            <div class="review">${(it.review_summary || []).slice(0,2).join(' / ')}</div>
            ${typeof it.similarity === 'number' ? `<div class="sub">유사도 ${(it.similarity * 100).toFixed(1)}%</div>` : ''}
            <a href="${it.product_url}" target="_blank" rel="noreferrer">원문 상품 보기</a>
            <div class="feedback-row"><button class="mini-btn" onclick="sendImageFeedback('like', '${(it.product_url||'').replace(/'/g,"&#39;")}', '${(it.title||'').replace(/'/g,"&#39;")}', '${(it.brand||'').replace(/'/g,"&#39;")}', '${String(it.price ?? '').replace(/'/g,"&#39;")}', '${(it.thumbnail||'').replace(/'/g,"&#39;")}')">👍 좋아요</button><button class="mini-btn" onclick="sendImageFeedback('unlike', '${(it.product_url||'').replace(/'/g,"&#39;")}', '${(it.title||'').replace(/'/g,"&#39;")}', '${(it.brand||'').replace(/'/g,"&#39;")}', '${String(it.price ?? '').replace(/'/g,"&#39;")}', '${(it.thumbnail||'').replace(/'/g,"&#39;")}')">↩ 좋아요 취소</button><button class="mini-btn" onclick="sendImageFeedback('dislike', '${(it.product_url||'').replace(/'/g,"&#39;")}', '${(it.title||'').replace(/'/g,"&#39;")}', '${(it.brand||'').replace(/'/g,"&#39;")}', '${String(it.price ?? '').replace(/'/g,"&#39;")}', '${(it.thumbnail||'').replace(/'/g,"&#39;")}')">🚫 아님</button></div>
          </div>`;
        grid.appendChild(card);
      }
    }

    function updateMoreButton(){
      const hasNext = Object.values(state.nextMap).some(v => !!v);
      moreBtn.disabled = !hasNext;
      moreBtn.style.opacity = hasNext ? '1' : '0.5';
      const parts = ACTIVE_SITES.map(s => `${s}:${state.nextMap[s] ? 'next 있음' : '끝'}`);
      moreBtn.textContent = hasNext ? `더보기 (${parts.join(' | ')})` : `더보기 (모든 사이트 끝)`;
    }

    const DEFAULT_COLORS = ['beige','ivory','gray','navy','red','yellow','pink','black'];

    function sortLabel(v){
      if (v === 'rating_desc') return '평점순';
      if (v === 'review_count_desc') return '리뷰 많은순';
      return '기본(인기)';
    }

    async function sendImageFeedback(action, productUrl, title, brand, price, thumbnail){
      const fd = new FormData();
      fd.append('action', action);
      fd.append('product_url', productUrl || '');
      fd.append('title', title || '');
      fd.append('brand', brand || '');
      fd.append('price', price || '');
      fd.append('thumbnail', thumbnail || '');
      await fetch('/image-feedback', { method:'POST', body: fd });
      if (action === 'dislike') {
        imageMeta.textContent = '이제부터 해당상품은 숨김처리됩니다~';
      } else if (action === 'like') {
        imageMeta.textContent = '좋아요 리스트에 저장되었습니다~';
      } else if (action === 'unlike') {
        imageMeta.textContent = '좋아요가 취소되었습니다~';
      }
    }

    async function showLikedItems(){
      const res = await fetch('/liked');
      const data = await res.json();
      if (!data.ok) return;
      state.items = (data.items || []).map(it => ({
        site: '좋아요',
        brand: it.brand || '-',
        title: it.title || '-',
        price: Number(it.price || 0) || null,
        product_url: it.product_url,
        thumbnail: it.thumbnail || '',
        rating: null,
        review_count: null,
        review_summary: [],
      }));
      state.nextMap = {};
      render(state.items);
      metaMain.textContent = `좋아요 저장 상품 ${state.items.length}개`;
      metaSub.textContent = '좋아요 모아보기 화면';
      moreBtn.disabled = true;
      moreBtn.style.opacity = '0.5';
    }

    async function runImageSearch(){
      const file = styleImageInput?.files?.[0];
      if (!file) {
        imageMeta.textContent = '이미지 파일을 먼저 선택해줘.';
        return;
      }

      imageMeta.textContent = '사진 분석 중...';
      const fd = new FormData();
      fd.append('image', file);
      fd.append('gender', imageGender?.value || 'auto');
      fd.append('category', imageCategory?.value || 'auto');

      const res = await fetch('/image-search', { method: 'POST', body: fd });
      const data = await res.json();
      if (!data.ok) {
        imageMeta.textContent = `사진 분석 실패: ${data.error || 'unknown'}`;
        return;
      }

      document.getElementById('q').value = data.query || '여자 니트';
      const t = data.tags || {};
      const tagText = Array.isArray(t.style_tags) && t.style_tags.length ? ` / 태그:${t.style_tags.join(', ')}` : '';
      const confText = (typeof t.confidence === 'number') ? ` / 신뢰도:${(t.confidence * 100).toFixed(0)}%` : '';
      imageMeta.textContent = `추론: ${data.query} · 성별:${t.gender || '-'} / 색:${t.color || '-'} / 무늬:${t.pattern || '-'} / 종류:${t.item || '-'}${tagText}${confText} (${data.note || ''})`;
      if (searchHint) {
        searchHint.textContent = `팁: 현재 검색어 "${data.query}"에서 색/종류/무늬를 한 단어씩 바꿔보면 원하는 결과를 더 빨리 찾을 수 있어요.`;
      }

      state.query = data.query || state.query;
      state.items = data.items || [];
      state.nextMap = {};
      state.generatedAt = new Date().toISOString();
      render(state.items);
      updateMoreButton();
      metaMain.textContent = `이미지 유사 검색 결과 ${state.items.length}개 · 생성시각(KST) ${formatKST(state.generatedAt)}`;
      metaSub.textContent = `정렬: 이미지 유사도 · 업데이트 주기: 자동 1시간 + 수동 (업데이트 버튼)`;
    }

    function startAutoRefresh(){
      if (state.autoRefreshStarted) return;
      state.autoRefreshStarted = true;
      setInterval(() => runSearch(), AUTO_REFRESH_MS);
    }

    function buildFilters(){
      const minPriceVal = Number(document.getElementById('minPrice').value || 0);
      const maxPriceVal = Number(document.getElementById('maxPrice').value || 0);
      const usePrice = minPriceVal > 0 || maxPriceVal > 0;
      return {
        category: 'knitwear',
        season: 'spring',
        color: DEFAULT_COLORS,
        price_range: usePrice ? [minPriceVal || 0, maxPriceVal || 9999999] : [30000, 100000],
      };
    }

    async function runSearch(){
      state.query = document.getElementById('q').value.trim() || '여성 봄 니트';
      state.filters = buildFilters();
      state.sortBy = document.getElementById('sortBy').value || 'popular';
      metaMain.textContent = '검색 중...';

      const body = {
        query: state.query,
        sites: ACTIVE_SITES,
        sort: state.sortBy,
        limit_per_site: 50,
        include_reviews: true,
        filters: state.filters
      };

      const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      state.items = (data.results || []).flatMap(r => (r.items || []).map(it => ({...it, site: r.site})));
      state.nextMap = {};
      for (const s of ACTIVE_SITES) {
        state.nextMap[s] = data.pagination?.[s]?.next || null;
      }

      state.generatedAt = data.generated_at || null;
      const siteCounts = (data.results || []).map(r => `${r.site} ${r.items.length}개`).join(', ');
      const generatedKST = formatKST(state.generatedAt);
      metaMain.textContent = `결과 ${state.items.length}개 · 생성시각(KST) ${generatedKST}`;
      metaSub.textContent = `정렬: ${sortLabel(state.sortBy)} · 업데이트 주기: 자동 1시간 + 수동 (업데이트 버튼) · 사이트별: ${siteCounts}`;
      render(state.items);
      updateMoreButton();
    }

    async function loadMore(){
      const targetSites = ACTIVE_SITES.filter(site => state.nextMap[site]);
      const tasks = targetSites.map(async site => {
        const res = await fetch('/more', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            site,
            query: state.query,
            cursor: String(state.nextMap[site]),
            limit_per_site: 50,
            sort: state.sortBy,
            filters: state.filters
          })
        });
        const page = await res.json();
        return { site, page };
      });

      if (tasks.length === 0) return;

      moreBtn.disabled = true;
      const pages = await Promise.all(tasks);
      const stats = [];

      for (const { site, page } of pages) {
        const incoming = (page.items || []).map(it => ({...it, site: page.site}));
        const urlSet = new Set(state.items.map(i => i.product_url));
        let added = 0;
        for (const it of incoming) {
          if (!urlSet.has(it.product_url)) {
            state.items.push(it);
            urlSet.add(it.product_url);
            added += 1;
          }
        }
        state.nextMap[site] = page.next_cursor || null;
        stats.push(`${site} +${added}개`);
      }

      render(state.items);
      const generatedKST = formatKST(state.generatedAt);
      metaMain.textContent = `결과 ${state.items.length}개 · 생성시각(KST) ${generatedKST}`;
      metaSub.textContent = `정렬: ${sortLabel(state.sortBy)} · 업데이트 주기: 자동 1시간 + 수동 (업데이트 버튼) · 더보기: ${stats.join(', ')}`;
      updateMoreButton();
    }

    runSearch();
    startAutoRefresh();
  </script>
</body>
</html>
